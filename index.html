<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>OTP Vault + Device Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 24px;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .device-section {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            padding: 1rem 1.5rem;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            color: #e2e8f0;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .filter-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        .filter-btn:hover {
            background: rgba(59,130,246,0.3);
        }

        .device-list {
            padding: 1rem;
            max-height: 500px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 12px;
        }

        .device-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 12px 16px;
        }

        .device-name {
            font-weight: 600;
            color: #f1f5f9;
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .device-status {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 30px;
            background: #334155;
        }
        .status-online { background: #10b981; color: white; }
        .status-offline { background: #6b7280; color: white; }

        .sim-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #cbd5e1;
            margin-top: 6px;
            gap: 8px;
        }

        .sim-number {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 20px;
            word-break: break-all;
        }

        .copy-number-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #94a3b8;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.1s;
        }

        .copy-number-btn:hover {
            background: #3b82f6;
            color: white;
        }

        /* Mailbox section */
        .mailbox-section {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .mailbox-header {
            padding: 1rem 1.5rem;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .mailbox-header h2 {
            color: white;
            font-size: 1.2rem;
        }

        .mailbox-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #f1f5f9;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary {
            background: #3b82f6;
            border-color: #3b82f6;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .mailbox-messages {
            height: 400px;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .otp-card {
            background: rgba(15, 23, 42, 0.7);
            border-left: 4px solid #3b82f6;
            border-radius: 1rem;
            padding: 12px;
            transition: 0.1s;
        }

        .otp-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 0.7rem;
            color: #94a3b8;
        }

        .otp-sender {
            background: #334155;
            padding: 2px 8px;
            border-radius: 20px;
            font-family: monospace;
        }

        .otp-text {
            font-size: 0.85rem;
            color: #e2e8f0;
            word-break: break-word;
            margin: 6px 0;
        }

        .empty-mailbox {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }

        .debug-info {
            font-size: 0.7rem;
            color: #64748b;
            padding: 0.5rem 1rem;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        @media (max-width: 768px) {
            .device-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    // Build name-to-status map from Firebase (online/offline)
    let statusMap = {}; // name -> status

    // Helper: clean phone number (just in case we need fallback)
    function cleanPhoneNumber(simValue) {
        if (!simValue || typeof simValue !== 'string') return null;
        const digitsOnly = simValue.replace(/\D/g, '');
        if (digitsOnly.length === 0) return null;
        if (digitsOnly.length === 12 && digitsOnly.startsWith('91')) return digitsOnly.substring(2);
        if (digitsOnly.length === 10) return digitsOnly;
        if (digitsOnly.length > 10) return digitsOnly.slice(-10);
        return null;
    }

    // OTP detection: InCred or Rupiyo
    function isDesiredOtp(msgObj) {
        if (!msgObj || !msgObj.msg) return false;
        const sender = msgObj.ph || "";
        const text = msgObj.msg;
        const isInCred = (sender === "CP-INCMNY-S" || sender === "CP- INCMNY -S") && text.includes("InCred Money");
        const isRupiyo = (sender === "CP-GGMOTP-S") && text.includes("Rupiyo");
        return isInCred || isRupiyo;
    }

    function extractOtpCode(text) {
        const match = text.match(/\b(\d{4,6})\b/);
        return match ? match[1] : null;
    }

    function formatTime(ms) {
        if (!ms) return "Just now";
        const d = new Date(parseInt(ms));
        if (isNaN(d.getTime())) return "Unknown";
        return d.toLocaleString('en-IN', { hour:'2-digit', minute:'2-digit', second:'2-digit', day:'2-digit', month:'short' });
    }

        setTimeout(() => toast.remove(), 1500);

    async function copyNumber(number) {
        if (number) {
            await navigator.clipboard.writeText(number);
            showToast(`📞 Copied: ${number}`);
        } else {

        }

    async function copyOtp(otpCode, fullMessage) {
        let code = otpCode || extractOtpCode(fullMessage);
        if (code) {
            await navigator.clipboard.writeText(code);
            showToast(`✅ Copied OTP: ${code}`);
        } else {

    // Fetch Firebase data (all branches, recursively)
    async function fetchAllFirebaseData() {
        const resp = await fetch(FIREBASE_URL);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        return await resp.json();
    }

    // Extract all SMS messages from the entire Firebase structure
    function extractAllSmsMessages(data) {
        const messages = [];
        // Recursively look for objects with "Sms" key
        function traverse(obj, path = "") {
            if (!obj || typeof obj !== 'object') return;
            if (obj.Sms && typeof obj.Sms === 'object') {
                // Found Sms node
                for (const did in obj.Sms) {
                    const deviceSms = obj.Sms[did];
                    if (deviceSms && typeof deviceSms === 'object') {
                        for (const msgId in deviceSms) {
                            const msg = deviceSms[msgId];
                            if (msg && msg.msg) {
                                messages.push({
                                    ...msg,
                                    did: did
                                });
                            }
                        }
                    }
                }
            }
            // Recurse deeper
            for (const key in obj) {
                if (obj[key] && typeof obj[key] === 'object') {
                    traverse(obj[key], `${path}/${key}`);
                }
            }
        }
        traverse(data);
        return messages;
    }

    // Extract device status from Firebase (Info nodes)
    function extractDeviceStatus(data) {
        const status = {};
        function traverse(obj) {
            if (!obj || typeof obj !== 'object') return;
            if (obj.Info && typeof obj.Info === 'object') {
                for (const did in obj.Info) {
                    const dev = obj.Info[did];
                    if (dev && dev.Name) {
                        status[dev.Name] = dev.status || "Offline";
                    }
                }
            }
            for (const key in obj) {
                if (obj[key] && typeof obj[key] === 'object') {
                    traverse(obj[key]);
                }
            }
        }
        traverse(data);
        return status;
    }

    // Update status map from Firebase
    async function updateStatusMap() {
        try {
            const data = await fetchAllFirebaseData();
            statusMap = extractDeviceStatus(data);
            renderDeviceList(); // re-render when status updates
        } catch (err) {
            console.error("Error fetching status:", err);
        }
    }

    // Render device list based on current filter (using masterDevices)
    function renderDeviceList() {
        const container = document.getElementById('deviceList');
        let filtered = [...masterDevices];
        
        if (currentFilter === "online") {
            filtered = filtered.filter(dev => statusMap[dev.name] === "Online");
        } else if (currentFilter === "offline") {
            filtered = filtered.filter(dev => statusMap[dev.name] !== "Online");
        }
        // "all" keeps all

        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-mailbox">No devices found for this filter.</div>`;
            return;
        }

        container.innerHTML = '';
        filtered.forEach((dev, idx) => {
            const status = statusMap[dev.name] || "Offline";
            const card = document.createElement('div');
            card.className = 'device-card';
            card.innerHTML = `
                <div class="device-name">
                    <span>${idx+1}. ${escapeHtml(dev.name)}</span>
                    <span class="device-status ${status === 'Online' ? 'status-online' : 'status-offline'}">${status}</span>
                </div>
                <div class="sim-row">
                    <span>📱 SIM 1:</span>
                    <span class="sim-number">${dev.sim1 ? dev.sim1 : '—'}</span>
                    ${dev.sim1 ? `<button class="copy-number-btn" data-number="${dev.sim1}">📋 Copy</button>` : '<span></span>'}
                </div>
                <div class="sim-row">
                    <span>📱 SIM 2:</span>
                    <span class="sim-number">${dev.sim2 ? dev.sim2 : '—'}</span>
                    ${dev.sim2 ? `<button class="copy-number-btn" data-number="${dev.sim2}">📋 Copy</button>` : '<span></span>'}
                </div>
            `;
            card.querySelectorAll('.copy-number-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyNumber(btn.getAttribute('data-number'));
                });
            });
            container.appendChild(card);
        });
    }

    // Persist OTPs to localStorage
    function persistOtps() {
        localStorage.setItem(STORAGE_OTPS, JSON.stringify(allReceivedOtps));
        localStorage.setItem(STORAGE_PROCESSED, JSON.stringify(Array.from(processedMsgIds)));
    }

    // Load from localStorage on init
    function loadPersistedData() {
        const storedOtps = localStorage.getItem(STORAGE_OTPS);
        if (storedOtps) {
            allReceivedOtps = JSON.parse(storedOtps);
        }
        const storedProcessed = localStorage.getItem(STORAGE_PROCESSED);
        if (storedProcessed) {
            processedMsgIds = new Set(JSON.parse(storedProcessed));
        }
        renderMailbox();
    }

    // Render mailbox (all OTPs, newest first)
    function renderMailbox() {
        const container = document.getElementById('mailboxMessages');
        if (allReceivedOtps.length === 0) {
            container.innerHTML = `<div class="empty-mailbox">📭 No OTPs received yet.</div>`;
            return;
        }
        const sorted = [...allReceivedOtps].sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
        container.innerHTML = '';
        for (const otp of sorted) {
            const card = document.createElement('div');
            card.className = 'otp-card';
            const otpCode = extractOtpCode(otp.text);
            card.innerHTML = `
                <div class="otp-header">
                    <span>🕒 ${otp.timeFormatted}</span>
                    <span class="otp-sender">✉️ ${escapeHtml(otp.sender)}</span>
                    <span>📱 ${otp.deviceNumber || 'Unknown'}</span>
                    <button class="copy-otp-btn" data-otp="${otpCode || ''}" data-fullmsg="${escapeHtml(otp.text)}">📋 Copy OTP</button>
                </div>
                <div class="otp-text">${escapeHtml(otp.text)}</div>
            `;
            const copyBtn = card.querySelector('.copy-otp-btn');
            copyBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const otp = copyBtn.getAttribute('data-otp');
                const full = copyBtn.getAttribute('data-fullmsg');
                copyOtp(otp, full);
            });
            container.appendChild(card);
        }
    }

    // Poll for new OTPs (every 2 seconds)
    let isPolling = false;
    let pollInterval = null;

    async function checkForNewOtps() {
        if (isPolling) return;
        isPolling = true;
        try {
            const data = await fetchAllFirebaseData();
            const allMessages = extractAllSmsMessages(data);
            
            // Also update status map while we're at it
            statusMap = extractDeviceStatus(data);
            renderDeviceList();

            const newMessages = [];
            for (const msg of allMessages) {
                const uniqueKey = `${msg.did}_${msg.msgId || Math.random()}`; // we need a unique identifier
                // Since messages may not have a fixed ID, we use a hash of the message content + timestamp as fallback
                let msgKey = `${msg.did}_${msg.msg}_${msg.date}`;
                if (msg.msgId) msgKey = `${msg.did}_${msg.msgId}`;
                
                if (!processedMsgIds.has(msgKey) && isDesiredOtp(msg)) {
                    processedMsgIds.add(msgKey);
                    // Find device number from master list
                    const deviceInfo = masterDevices.find(d => d.name === (msg.deviceName || "Unknown"));
                    const deviceNumber = deviceInfo ? (deviceInfo.sim1 || deviceInfo.sim2) : null;
                    const otpObj = {
                        text: msg.msg,
                        timestamp: msg.date || Date.now(),
                        timeFormatted: formatTime(msg.date || Date.now()),
                        sender: msg.ph || "Unknown",
                        deviceName: msg.deviceName || "Unknown",
                        deviceNumber: deviceNumber,
                        did: msg.did
                    };
                    newMessages.push(otpObj);
                    allReceivedOtps.push(otpObj);
                    console.log(`📩 New OTP: ${msg.msg.substring(0, 60)}`);
                }
            }

            if (newMessages.length > 0) {
                persistOtps();
                renderMailbox();
            }
            document.getElementById('debugInfo').innerHTML = `⏱️ Last check: ${new Date().toLocaleTimeString()} | Auto‑refresh every 2s`;
        } catch (err) {
            console.error("Poll error:", err);
            document.getElementById('debugInfo').innerHTML = `⚠️ Error: ${err.message}`;
        } finally {
            isPolling = false;
        }
    }

    // Mark existing messages as processed on first load
    async function markExistingAsProcessed() {
        try {
            const data = await fetchAllFirebaseData();
            const allMessages = extractAllSmsMessages(data);
            for (const msg of allMessages) {
                if (isDesiredOtp(msg)) {
                    let msgKey = `${msg.did}_${msg.msg}_${msg.date}`;
                    if (msg.msgId) msgKey = `${msg.did}_${msg.msgId}`;
                    processedMsgIds.add(msgKey);
                }
            }
            persistOtps();
            console.log(`Pre‑marked ${processedMsgIds.size} existing OTPs.`);
        } catch (err) {
            console.warn("Could not pre-mark", err);
        }
    }

    // Clear mailbox (both UI and storage)
    function clearMailbox() {
        allReceivedOtps = [];
        processedMsgIds.clear();
        persistOtps();
        renderMailbox();
        showToast("Mailbox cleared");
    }

    // Show history modal
    function showHistory() {
        const modal = document.getElementById('historyModal');
        const historyList = document.getElementById('historyList');
        if (allReceivedOtps.length === 0) {
            historyList.innerHTML = `<div class="empty-mailbox">No OTPs received.</div>`;
        } else {
            historyList.innerHTML = '';
            const sorted = [...allReceivedOtps].sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
            for (const otp of sorted) {
                const card = document.createElement('div');
                card.className = 'otp-card';
                card.style.marginBottom = '8px';
                const otpCode = extractOtpCode(otp.text);
                card.innerHTML = `
                    <div class="otp-header">
                        <span>🕒 ${otp.timeFormatted}</span>
                        <span class="otp-sender">✉️ ${escapeHtml(otp.sender)}</span>
                        <span>📱 ${otp.deviceNumber || 'Unknown'}</span>
                        <button class="copy-otp-btn" data-otp="${otpCode || ''}" data-fullmsg="${escapeHtml(otp.text)}">📋 Copy OTP</button>
                    </div>
                    <div class="otp-text">${escapeHtml(otp.text)}</div>
                `;
                const copyBtn = card.querySelector('.copy-otp-btn');
                copyBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const otp = copyBtn.getAttribute('data-otp');
                    const full = copyBtn.getAttribute('data-fullmsg');
                    copyOtp(otp, full);
                });
                historyList.appendChild(card);
            }
        }
        modal.style.display = 'flex';
    }

    function closeHistory() {
        document.getElementById('historyModal').style.display = 'none';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Manual refresh
    async function manualRefresh() {
        await checkForNewOtps();
    }

    // Set filter
    function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.getAttribute('data-filter') === filter) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        renderDeviceList();
    }

    // Initialization
    async function init() {
        loadPersistedData();
        await updateStatusMap();
        await markExistingAsProcessed();
        startPolling();
        attachEventListeners();
    }

    function startPolling() {
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(checkForNewOtps, 2000); // 2 seconds
        setTimeout(checkForNewOtps, 500);
    }

    function attachEventListeners() {
        document.getElementById('clearMailboxBtn').addEventListener('click', clearMailbox);
        document.getElementById('historyBtn').addEventListener('click', showHistory);
        document.getElementById('refreshNowBtn').addEventListener('click', manualRefresh);
        document.getElementById('closeModalBtn').addEventListener('click', closeHistory);
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('historyModal');
            if (e.target === modal) closeHistory();
        });
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => setFilter(btn.getAttribute('data-filter')));
        });
    }

    init();
</script>
</body>
</html>
